# ──────────────────────────────────────────────────────────────
# Mirror main to the Lovable-managed repo (autolables-95db60ea)
#
# Purpose: Lovable watches a separate GitHub repo (auto-created
# when Ken first wired Lovable up). Our canonical code lives at
# KenCarbiz/autolables. Every push to main here force-pushes to
# the Lovable repo so the two never drift.
#
# SETUP (one-time):
#   1. Create a Personal Access Token with "repo" scope that has
#      write access to BOTH autolables and autolables-95db60ea
#      (fine-grained token: select both repos, Contents: Read/Write).
#      https://github.com/settings/tokens
#   2. In the KenCarbiz/autolables repo, add it as a Secret:
#      Settings → Secrets and variables → Actions → New repository
#      secret. Name: MIRROR_PAT. Value: the PAT.
#   3. Trigger this workflow once manually to seed the first mirror:
#      Actions tab → "Mirror to Lovable repo" → Run workflow.
#
# After that, it runs on every push to main automatically.
# ──────────────────────────────────────────────────────────────

name: Mirror to Lovable repo

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force-push even if target is ahead'
        type: boolean
        default: true

concurrency:
  group: mirror-to-lovable
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Push to Lovable mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          if [ -z "$MIRROR_PAT" ]; then
            echo "::error::MIRROR_PAT secret is not set. See .github/workflows/mirror-to-lovable.yml header for setup instructions."
            exit 1
          fi
          git config user.name "autolabels-mirror"
          git config user.email "mirror@autolabels.io"
          git remote add mirror "https://x-access-token:${MIRROR_PAT}@github.com/KenCarbiz/autolables-95db60ea.git"
          # Force-push main so the two stay aligned even if the mirror
          # has diverged (Lovable sometimes commits bot changes).
          git push mirror main:main --force

      - name: Summary
        run: |
          echo "✓ Mirrored $(git rev-parse --short HEAD) to autolables-95db60ea/main"
