# ──────────────────────────────────────────────────────────────
# CI — enforce compliance logic + typecheck + build on every push.
#
# These tests exist for one reason: the red-team hard-block, SB 766
# return flow, state engine, and E-SIGN hash chain are legally
# load-bearing. If they drift silently, a dealer signs a deal
# against a regressed rule and the FTC / state AG has a case.
#
# This workflow runs `bun run test` + typecheck + build so a push
# that breaks any of them shows red before merge.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc -p tsconfig.app.json --noEmit

      - name: Tests
        run: bun run test

      - name: Production build smoke
        run: bun run build
